services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: laborman
      POSTGRES_USER: laborman
      POSTGRES_PASSWORD: laborman
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laborman -d laborman"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://laborman:laborman@db:5432/laborman
      BACKEND_CORS_ORIGINS: http://localhost:8888,http://127.0.0.1:8888
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
